<!DOCTYPE html>
<html class="light" lang="tr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Teşekkürler | Selçuk TÜME</title>
    <meta name="description" content="Mesajınız başarıyla gönderildi." />
    <link
        href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#82a540",
                        "brand-green": "#82a540",
                        "brand-navy": "#0b2840",
                        "on-surface": "#231f20",
                        "surface": "#ffffff",
                        "surface-container-low": "#ffffff",
                        "surface-container-high": "#d3d3d3",
                        "surface-container-highest": "#d3d3d3",
                        "surface-container-lowest": "#ffffff",
                        "on-surface-variant": "#888888",
                        "primary-container": "#82a540"
                    },
                    "fontFamily": {
                        "headline": ["Public Sans", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                },
            }
        }
    </script>
    <style>
        .font-akhand-bold {
            font-family: 'Public Sans', sans-serif;
            font-weight: 900;
            letter-spacing: -0.04em;
        }
        .font-akhand-regular {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        .bounce-in { animation: bounceIn 0.6s ease forwards; }
        @keyframes fadeUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .fade-up { animation: fadeUp 0.5s ease 0.4s forwards; opacity: 0; }
        .fade-up-2 { animation: fadeUp 0.5s ease 0.6s forwards; opacity: 0; }
    </style>
</head>

<body class="bg-[#f7f7f7] font-akhand-regular text-on-surface antialiased flex flex-col min-h-screen">
    <!-- TopNavBar -->
    <nav class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-md flex justify-between items-center px-8 md:px-12 py-3 max-w-full mx-auto font-akhand-regular antialiased text-sm tracking-tight border-b border-surface-container-high/50">
        <a href="index.html" class="text-xl md:text-2xl font-akhand-bold text-brand-navy uppercase tracking-tighter hover:text-brand-green transition-colors duration-300">
            Selçuk tüme
        </a>
        <div class="hidden md:flex space-x-6 items-center">
            <a class="text-brand-navy font-medium hover:text-brand-green transition-colors duration-300" href="index.html">Anasayfa</a>
            <a class="text-brand-navy font-medium hover:text-brand-green transition-colors duration-300" href="uyelerimiz.html">Üyelerimiz</a>
            <a class="text-brand-navy font-medium hover:text-brand-green transition-colors duration-300" href="projelerimiz.html">Projelerimiz</a>
            <a class="text-brand-green font-bold border-b-2 border-brand-green pb-1" href="iletisim.html">İletişim</a>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center pt-20 pb-20">
        <div class="text-center max-w-md mx-auto px-6">
            <!-- Checkmark Icon -->
            <div class="bounce-in inline-flex items-center justify-center w-24 h-24 rounded-full bg-brand-green/10 mb-8">
                <span class="material-symbols-outlined text-brand-green" style="font-size: 3rem;">check_circle</span>
            </div>

            <!-- Text -->
            <h1 class="fade-up text-4xl md:text-5xl font-akhand-bold text-brand-navy mb-4">
                Teşekkürler!
            </h1>
            <p class="fade-up text-on-surface-variant text-base leading-relaxed mb-10">
                Mesajınız başarıyla gönderildi.<br/>En kısa sürede size dönüş yapacağız.
            </p>

            <!-- Back Button -->
            <a href="index.html"
                class="fade-up-2 inline-flex items-center gap-2 bg-brand-green text-white px-8 py-4 rounded-xl font-akhand-bold text-base hover:shadow-lg hover:brightness-105 transition-all">
                <span class="material-symbols-outlined text-xl">arrow_back</span>
                Ana Sayfaya Dön
            </a>
        </div>
    </main>
</body>

</html>
