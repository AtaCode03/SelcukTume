name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # main branch'e her push'ta otomatik çalışır

# ─── İzinler ──────────────────────────────────────────────────────────────────
# contents:write  → runner'ın workspace dosyalarını okuyup yazabilmesi için
# pages:write     → GitHub Pages artifact push edebilmek için
# id-token:write  → OIDC token (actions/deploy-pages için zorunlu)
permissions:
  contents: write
  pages: write
  id-token: write

# Aynı anda sadece bir deploy; çakışmayı önler
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ── 1) Kodu çek ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2) Debug: Dizin yapısını listele (sorun giderme için) ───────────────
      - name: List repository files
        shell: bash
        run: |
          echo "=== GITHUB_WORKSPACE: $GITHUB_WORKSPACE ==="
          echo ""
          echo "=== Kök dizindeki dosyalar ==="
          ls -la "$GITHUB_WORKSPACE"

      # ── 3) config.js dosyasını şablondan oluştur ────────────────────────────
      - name: Create config.js from template
        shell: bash
        run: |
          cp "$GITHUB_WORKSPACE/config.example.js" \
             "$GITHUB_WORKSPACE/config.js"
          echo "config.js oluşturuldu:"
          cat "$GITHUB_WORKSPACE/config.js"

      # ── 4) Placeholder'ları GitHub Secrets ile değiştir ─────────────────────
      - name: Inject EmailJS secrets into config.js
        shell: bash
        env:
          EMAILJS_SERVICE_ID:  ${{ secrets.EMAILJS_SERVICE_ID }}
          EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          EMAILJS_PUBLIC_KEY:  ${{ secrets.EMAILJS_PUBLIC_KEY }}
        run: |
          CONFIG="$GITHUB_WORKSPACE/config.js"

          sed -i "s|REPLACE_WITH_SERVICE_ID|${EMAILJS_SERVICE_ID}|g"   "$CONFIG"
          sed -i "s|REPLACE_WITH_TEMPLATE_ID|${EMAILJS_TEMPLATE_ID}|g" "$CONFIG"
          sed -i "s|REPLACE_WITH_PUBLIC_KEY|${EMAILJS_PUBLIC_KEY}|g"   "$CONFIG"

          echo "Injection tamamlandı. Satır sayısı: $(wc -l < $CONFIG)"

      # ── 5) Doğrulama: Hâlâ placeholder var mı? ──────────────────────────────
      - name: Verify injection was successful
        shell: bash
        run: |
          CONFIG="$GITHUB_WORKSPACE/config.js"

          if grep -q "REPLACE_WITH" "$CONFIG"; then
            echo "HATA: config.js içinde hâlâ placeholder değerler var!"
            echo "Lütfen GitHub Secrets'ı kontrol et:"
            echo "  Settings → Secrets and variables → Actions"
            echo "  EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, EMAILJS_PUBLIC_KEY"
            exit 1
          fi

          echo "✅ Tüm placeholder'lar başarıyla değiştirildi."

      # ── 6) GitHub Pages artifact'ını hazırla ────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "${{ github.workspace }}"

      # ── 7) Deploy! ───────────────────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
